services:
  - type: web
    name: bingo18-dashboard
    runtime: node
    rootDir: bingo18-dashboard
    plan: free
    autoDeploy: true
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: POLL_INTERVAL_MS
        value: 6000
