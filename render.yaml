services:
  - type: web
    name: bingo18-dashboard
    runtime: node
    rootDir: bingo18-dashboard
    plan: free
    autoDeploy: true
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: BOOTSTRAP_DELAY_MS
        value: 3000
      - key: POLL_INTERVAL_MS
        value: 30000
      - key: ENABLE_POLLING
        value: true
      - key: FULL_SYNC_ON_STARTUP
        value: false
